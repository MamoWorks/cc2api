services:
  claude-code-gateway:
    image: ghcr.io/mamoworks/claude-code-gateway:latest
    container_name: claude-code-gateway
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "${SERVER_PORT:-5674}:5674"
    volumes:
      - claude-code-gateway-data:/app/data
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: claude-code-gateway-postgres
    env_file:
      - .env
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

